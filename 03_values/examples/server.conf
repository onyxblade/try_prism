# 值現在可以是陣列、雜湊,並可任意巢狀。
set :host, "localhost"
set :port, 3000
set :tags, ["web", "api", "internal"]
set :limits, { rate: 100, burst: 200 }

group :database do
  set :adapter, "postgres"
  set :replicas, ["r1.local", "r2.local"]
  set :options, { ssl: true, timeout: 30, retries: [1, 2, 5] }
end

# 裸關鍵字參數也支援,等同加大括號:
set :cache, store: "redis", ttl: 60
