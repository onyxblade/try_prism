# 六種攻擊,全部在同一道「名字/形狀」閘門被拒,而且一次回報。
# 注意:system / File.read / 反引號 全程【沒有被執行】—— 只是被解析、被收集。
set :a, system("rm -rf /")            # 值位置呼叫未註冊函數 → 拒絕
set :b, File.read("/etc/passwd")      # 帶 receiver 的呼叫 → 拒絕
exec "/bin/sh"                        # 未註冊的指令 → 拒絕
set :c, env("PATH").split(":")        # 方法鏈(receiver 非 nil)→ 拒絕
listen host: "0.0.0.0", port: 22 do   # 對只收 flat 的指令硬塞區塊 → 拒絕
  set :sneaky, 1
end
plugin :p, cmd: `id`                  # 反引號 XString → 值閘門拒絕
