# 一份合法設定:只用了 host 在 app_dsl.rb 宣告的詞彙。
# set/group/ref 是內建;env/to_int/path_join/listen/plugin 是 host 加的接口。
set :root, "/srv/billing"
set :name, env("APP_NAME", "billing")
set :port, to_int(env("PORT", "8080"))
set :log,  path_join(ref(:root), "log", "app.log")

# 指令帶關鍵字參數;值裡可以用 ref 回頭參照已設定的 key。
listen host: "127.0.0.1", port: ref(:port)

group :limits do
  set :rps,   100
  set :burst, ref(:rps)
end

# plugin 可重複呼叫,host handler 把它們累積成一個清單。
plugin :auth, provider: "oauth", scopes: [:read, :write]
plugin :metrics
