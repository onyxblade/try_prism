# 值之間可用 ref(:key) 互相參照(只能向後、可跨到外層作用域)。
set :host, "db.internal"
set :port, 5432
set :primary, ref(:host)            # 同層參照先前設定的 host

group :replica do
  set :weight, 1
  set :host, ref(:host)             # 沿作用域鏈參照「外層」的 host
  set :pair, [ref(:host), ref(:port)]   # ref 也可出現在陣列/雜湊裡
end

group :pool do
  set :endpoints, { primary: ref(:primary), port: ref(:port) }
end
